name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # every Monday at 2am
  workflow_dispatch:

jobs:
  scan:
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        image:
          - name: oss-stack-fe
            full: ghcr.io/xplurdata/oss-stack-fe:1.0.0
          - name: oss-stack-be
            full: ghcr.io/xplurdata/oss-stack-be:1.0.0
          - name: oss-stack-app
            full: ghcr.io/xplurdata/oss-stack-app:1.0.0
          - name: oss-stack-collector
            full: ghcr.io/xplurdata/oss-stack-collector:1.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ${{ matrix.image.full }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.full }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Run Grype scan
        run: |
          if ! command -v grype &>/dev/null && [ ! -f "$HOME/bin/grype" ]; then
            mkdir -p "$HOME/bin"
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/bin"
          fi
          export PATH="$HOME/bin:$PATH"
          grype ${{ matrix.image.full }} --output table

  badge:
    runs-on: self-hosted
    needs: scan
    if: always()
    steps:
      - name: Update scan badge
        run: |
          if [ "${{ needs.scan.result }}" = "success" ]; then
            STATUS="passing"
            COLOR="brightgreen"
          else
            STATUS="failing"
            COLOR="red"
          fi
          echo "Scan status: $STATUS"
